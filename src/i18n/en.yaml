# Dynamic gameplay log messages (GameState.log / messageLog), built by engine/reducer.ts and
# engine/eclipse.ts via the t() function. These are baked into plain strings at the moment they're
# generated (not re-translated retroactively if the player switches language mid-game) — same as
# how most apps treat a historical log/toast. Suffix fragments that get conditionally appended in
# JS (e.g. " — Vanguard: 0 AP") are their own keys so the calling code can compose them exactly like
# it already does with plain ternaries.
