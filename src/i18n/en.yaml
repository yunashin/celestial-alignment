  shootingStarTrackerDown: "💫 Shooting Star! 💫 The Eclipse Tracker eases by {pct}%."
  shootingStarBonusAp: "💫 Shooting Star! 💫 Every Guardian gains +{amount} AP per turn from now on."
  shootingStarBonusHand: "💫 Shooting Star! 💫 Every Guardian's hand size grows by {amount} from now on."
  shootingStarHealUnlock: "💫 Shooting Star! 💫 Every Guardian can heal themselves {amount} HP from now on."
  asteroidHeader: "☄️ An asteroid tears loose from ({sx},{sy}) and hurtles toward ({dx},{dy})!"
  asteroidPassesCompletedPath: "　↳ streaks harmlessly past the completed path at ({x},{y})."
  asteroidGlancesEnclosed: "　↳ glances off the closed loop at ({x},{y}), unable to breach it."
  asteroidShattersLunarShield: "　↳ shatters against Cancer's Lunar Shield at ({x},{y})."
  asteroidPassesShootingStar: "　↳ streaks past the shooting star at ({x},{y}), leaving it untouched."
