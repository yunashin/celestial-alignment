# English (source of truth). Keys are dot-path, read by src/i18n/index.ts's t() function.
# Interpolation uses {paramName} placeholders (see t()'s own doc comment for exact syntax).
#
# Deliberately NOT translated here: any button label that shows an underlined keyboard-shortcut
# letter inline in its own text (Move, Purify, Cosmic Draw, End Turn, Back, Rotate, Terraform
# Hand, Discard to Heal, Protective Precision, Confirm x{n}) — those stay hardcoded English
# directly in JSX per product decision, since the underline always marks a literal English letter
# key (e.g. "M" for Move) that wouldn't make sense to underline in a translated word.

common:
  appNameLine1: "Celestial"
  appNameLine2: "Alignment"
  tagline: "Link the Edge Nodes to the Orrery before the Eclipse hits 100%"
  newRun: "New Run"
  stasisLabel: "STASIS"

setup:
  guardianCount: "{count} Guardians"
  boardSeedLabel: "Board Seed"
  boardSeedOptional: "Optional"
  boardSeedPlaceholder: "Leave blank for a random board"
  saveSeedTooltip: "Save this seed as a favorite"
  alreadySavedTooltip: "Already saved"
  favoriteSeedTooltip: "Seed: {seed}"
  renameSeedTooltip: "Edit to give your seed a nickname"
  removeSeedTooltip: "Delete seed from favorites"
  referenceTitle: "Zodiac Guardians Reference"
  elementGuardiansHeading: "{glyph} {label} Guardians"
  surgeHeading: "⚡️ {label} Surge"
  surgeSentence: "Place {article} card to {surgeText}"
  playerNamePlaceholder: "Guardian {n}"
  duplicateElementsWarning: "Each Guardian needs a different element — the win condition requires one path per player element."
  initializeButton: "Initialize Orrery ▸"
  howToPlayTab: "✦ How to Play"

# The Setup Screen's "How to Play" tab — a static rules/lore reference, not gameplay state, so
# unlike log/* this never needs interpolation params beyond the handful of difficulty-tuning
# constants folded in below (interval/threshold/etc.) to keep constants.ts the single source of
# truth even in prose. Keyboard LETTERS themselves (M, P, V, H, T, R, C, E, B, arrows, Enter/Space,
# 1-6) are deliberately hardcoded in HowToPlay.tsx, not translated here — same convention as the
# underlined-shortcut button labels noted at the top of this file, since a keyboard key isn't a
# word that has a translation.
howToPlay:
  intro: "Celestial Alignment is a local, pass-and-play <b>cooperative</b> game — no accounts, no server, no solo AI opponent, just everyone gathered around one screen taking turns. Every action can also be triggered entirely from the <b>keyboard</b>; expand the table below whenever you want the full shortcut list."
  shortcutsToggle: "⌨ Keyboard Shortcuts"
  shortcuts:
    categoryGeneral: "General"
    categoryBoard: "Board & Movement"
    categoryActions: "Actions"
    categorySign: "Sign-Specific"
    endTurn: "End your turn"
    back: "Abandon this run and return to Setup"
    escape: "Cancel the current mode or selection"
    arrows: "Move the board cursor one tile at a time"
    confirm: "Confirm the highlighted tile — place, move, or purify it"
    handSelect: "Select a hand card by its position"
    move: "Toggle Move mode"
    purify: "Toggle Purify mode"
    cosmicDraw: "Toggle Cosmic Draw mode — press again to confirm your discards"
    virgoShield: "Toggle Virgo's Protective Precision (Virgo only)"
    scorpioHeal: "Toggle Scorpio's Regeneration heal (Scorpio only)"
    terraform: "Terraform Hand (Capricorn only)"
    rotate: "Rotate the armed card before placing it (Aquarius only)"
  story:
    heading: "Story"
    text: "The Great Orrery — the cosmic clockwork that keeps the universe in balance — has shattered into fragments, scattering the stars and corrupting the constellations. A creeping cosmic void, known to every Guardian as the <b>Eclipse</b>, is swallowing the night sky one star at a time. You and your fellow Guardians are humanoid embodiments of the zodiac, and it falls to you to relink the sky before the Eclipse consumes it whole."
  objective:
    heading: "Objective"
    text: "Build a <b>Star Card</b> path — connected, unbroken, and free of corruption — from your Guardian's own element tile all the way to the <b>Orrery</b> at the center of the board. Every Guardian must complete their own path before the <b>Eclipse Tracker</b> reaches 100%, or the Eclipse wins instead."
  players:
    heading: "Players"
    text: "Every Guardian is a <b>Zodiac sign</b> with a unique ability — see the Zodiac Guardians Reference above for the full roster. Each sign also belongs to one of four elements (Fire, Water, Air, or Earth), and every Guardian of that element shares the same <b>Element Surge</b>: a bonus that triggers automatically whenever they place a Star Card matching their own element. No two Guardians in the same game can share an element, since each of you is racing to complete a different element's path."
  actionPoints:
    heading: "Action Points"
    text: "You start each of your turns with <b>{ap} AP</b> (some sign abilities grant more, or discount specific actions to 0). Moving, placing, and purifying all cost AP — once you're out, ending your turn is all that's left to do."
  decks:
    heading: "Decks"
    starDeck:
      label: "Star Card Deck"
      text: "Every Star Card has a connector shape and one of the four elements. On your turn, channel a card from your hand onto an empty tile you're standing on or adjacent to — the tile has to <b>connect back to your existing path</b> toward your element's edge node or the Orrery, so you can't drop cards in isolation. (One sign can channel cards at range — see the Zodiac Reference.) Whenever your hand isn't full at the end of your turn, it refills from the Star Card Deck at the start of your next one."
    eclipseDeck:
      label: "Eclipse Deck"
      intro: "One <b>Eclipse Card</b> resolves automatically at the end of every turn, chipping away at your position in one of four ways:"
      corruption:
        label: "Corruption Cards"
        text: "Seize a pure Star Card of a given element, turning it <b>corrupted</b>. A corrupted card decays on its own after <b>{decayTurns} of its placer's own turns</b> and crumbles to dust if it isn't purified first. If no vulnerable card of that element exists to seize, the Eclipse Tracker climbs instead."
      voidCard:
        label: "Black Hole Cards"
        text: "Open a Black Hole on a random empty tile — a <b>permanent, un-purifiable obstacle</b> that damages every Guardian standing adjacent to it the moment it appears."
      surge:
        label: "Surge Cards"
        text: "Jump the <b>Eclipse Tracker</b> by a random amount that grows the more corrupted Star Cards are currently on the board — letting corruption pile up gets dangerous fast."
      damage:
        label: "Damage Cards"
        text: "Strike every Guardian of a given element for <b>1 HP of damage</b> — and occasionally ('Mercury's in retrograde') hit every Guardian at once, regardless of element."
  environmentFactors:
    heading: "Environmental Factors"
    asteroids:
      label: "Asteroids"
      text: "An <b>impassable obstacle</b> that periodically breaks loose and streaks across the board in a straight line — every {interval2}, {interval3}, or {interval4} turns in a 2-, 3-, or 4-Guardian game respectively — destroying the Star Cards in its path and damaging any Guardian caught standing in it (though a Guardian keeps their own card even when they're hit). <b>Completed paths, closed loops, and sign-specific shields</b> are all safe from the blast."
    shootingStars:
      label: "Shooting Stars"
      text: "Every board hides <b>{shootingStarCount} Shooting Stars</b>, one per quadrant. Landing a Star Card on one immediately grants a random bonus to every Guardian:"
  turnActions:
    heading: "Turn Actions"
    channel:
      label: "Channel"
      text: "Place a Star Card from your hand onto a valid tile, extending your path outward."
    move:
      label: "Move"
      text: "Step onto an adjacent tile with a <b>matching connector</b> along your own path — or spend more AP to move several tiles in a single click, as long as you can afford every step."
    purify:
      label: "Purify"
      text: "Cleanse a corrupted Star Card back to full purity — it's permanently immune to corruption from then on. You can only purify a tile you've <b>personally walked onto (via Move)</b>, so plan your route with purifying in mind, not just placement."
    cosmicDraw:
      label: "Cosmic Draw"
      text: "Discard any number of hand cards — <b>up to your whole hand</b> — and immediately redraw until it's full again. A great way to dig for the card you actually need."
    abilitiesNote: "Every sign also has its own unique ability beyond these four core actions — check the roster above (or in-game) and use it every chance you get."
  winLoss:
    heading: "Winning & Losing"
    text: "The moment every active Guardian's path reaches the Orrery pure and unbroken, you all win together. But if the <b>Eclipse Tracker fills to 100%</b>, or <b>every Guardian ends up in Stasis</b> (0 HP) at the same time with nobody left to revive anyone, the Eclipse wins instead. A Guardian in Stasis isn't gone for good — if an ally ends their turn standing adjacent to them, they reboot at 1 HP."
  rules:
    heading: "Key Rules"
    asteroidProtection: "A <b>completed path</b> is permanently safe from the traveling asteroid."
    loopImmunity: "A <b>closed loop</b> of Star Cards — any shape that encloses an area — becomes permanently immune to both Corruption and the asteroid, whether or not it's part of a finished path."
    purifiedImmunity: "<b>Purifying</b> a Star Card makes it permanently immune to Corruption forever after, even if that path is never completed."
    chainDiscount: "A <b>chain of {chainThreshold}+</b> connected Star Cards sharing the same element grants a one-time discount to the Eclipse Tracker the moment the chain first reaches that length — bigger if it's your own element."

