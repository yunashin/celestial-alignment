# PLACEHOLDER — every value below is still the English source text (see this file's header note).
# Mirrors src/i18n/en.yaml's howToPlay section exactly; only the VALUES need translating.
howToPlay:
  intro: "셀레스티얼 얼라인먼트는 한 기기에서 화면을 넘겨가며 함께 즐기는 로컬 <b>협동</b> 게임입니다. 별도의 계정 생성이나 서버, 싱글 플레이용 AI 대전 상대 없이, 모두가 하나의 화면 앞에 모여 차례를 주고받으며 진행합니다. 모든 행동은 <b>키보드</b>로도 조작할 수 있으며, 전체 단축키 목록이 필요할 때마다 아래 단축키 창을 열어 확인할 수 있습니다."
  shortcutsToggle: "⌨ 키보드 단축키"
  shortcuts:
    categoryGeneral: "일반"
    categoryBoard: "보드 및 이동"
    categoryActions: "액션"
    categorySign: "가디언 고유 능력"
    endTurn: "턴 종료"
    back: "현재 여정을 포기하고 설정 화면으로 복귀"
    escape: "현재 모드 또는 선택 취소"
    arrows: "보드 커서를 한 칸씩 이동"
    confirm: "하이라이트된 타일 확정 (배치, 이동 또는 정화)"
    handSelect: "해당 위치의 손패 카드 선택"
    move: "이동 모드 전환"
    purify: "정화 모드 전환"
    cosmicDraw: "코스믹 드로우 모드 전환 (한 번 더 누르면 선택한 카드 버리기 확정)"
    virgoShield: "처녀자리의 방호의 정밀함 보호막 전환 (처녀자리 전용)"
    scorpioHeal: "전갈자리의 재생 치유 전환 (전갈자리 전용)"
    terraform: "테라포밍 손패 변환 (염소자리 전용)"
    rotate: "조준된 카드를 배치하기 전에 회전 (물병자리 전용)"
  boardImgCaption: "게임 진행 상황 — 외곽 노드들로부터 중앙의 오러리를 향해 전개되고 있는 스타 카드들의 경로."
  corruptionImgCaption: "오염된 타일의 카운트다운 툴팁과 그 주변에 위치한 소행성 및 별똥별."
  story:
    heading: "스토리"
    text: "우주의 균형을 유지하던 거대한 천체 시계, '위대한 오러리'가 산산조각 나 사방으로 파편이 튀면서 별들이 흩어지고 성운들이 오염되었습니다. 모든 가디언에게 <b>에클립스</b>로 알려진 서서히 번지는 우주의 공허가 밤하늘을 한 번에 별 한 개씩 집어삼키고 있습니다. 여러분과 동료 가디언들은 황도대를 인간화한 화신들입니다. 에클립스가 우주를 통째로 삼켜버리기 전에 밤하늘을 다시 연결해야 하는 임무가 여러분의 어깨에 달려 있습니다."
  objective:
    heading: "게임 목표"
    text: "각 가디언의 시작 원소 타일로부터 보드 중앙에 있는 <b>오러리</b>까지 오염되지 않고 일직선으로 이어진 순수한 <b>스타 카드</b> 경로를 구축하세요. <b>에클립스 추적기</b>가 100%에 도달하여 에클립스가 승리하기 전에, 모든 가디언이 각자의 전용 원소 경로를 모두 완성해야만 함께 승리할 수 있습니다."
  players:
    heading: "가디언 (플레이어)"
    text: "모든 가디언은 고유 능력을 지닌 <b>황도대 성좌</b> 중 하나를 맡게 됩니다. 자세한 능력 목록은 위의 '황도대 가디언 도감'에서 확인할 수 있습니다. 각 성좌는 4대 원소(불, 물, 바람, 대지) 중 하나에 속하며, 해당 원소에 속한 가디언들은 고유한 <b>원소 서지</b> 효과를 공유합니다. 이 보너스는 자신의 원소와 일치하는 스타 카드를 배치할 때마다 자동으로 발동됩니다. 모든 가디언은 서로 다른 원소 경로를 완성하기 위해 경쟁하므로, 한 게임에서 같은 원소를 중복하여 선택할 수 없습니다."
  actionPoints:
    heading: "행동력 (Action Points)"
    text: "각 턴이 시작될 때마다 기본적으로 <b>{ap} AP</b>를 가지고 시작합니다 (일부 성좌의 능력으로 더 많이 얻거나 특정 액션의 비용을 0 AP로 감면받을 수 있습니다). 이동, 배치, 정화 액션에는 모두 AP가 소모되며, 행동력을 모두 소진한 후에는 턴을 종료하는 것 외에 다른 행동을 할 수 없습니다."
  decks:
    heading: "덱 구성"
    starDeck:
      label: "스타 카드 덱"
      text: "모든 스타 카드에는 고유한 연결 통로 모양과 4대 원소 중 하나가 부여되어 있습니다. 자신의 턴에 손패에 있는 카드를 자신이 서 있거나 인접한 빈 타일에 전개할 수 있습니다. 이때 카드는 반드시 자신의 외곽 노드나 오러리를 향해 <b>기존 경로와 물리적으로 연결</b>되어야 하며, 기존 경로와 떨어진 고립된 공간에는 카드를 배치할 수 없습니다. (일부 성좌는 원거리 전개가 가능하므로 황도대 도감을 참조하세요.) 턴 종료 시 손패가 가득 차지 않은 경우, 다음 턴이 시작될 때 스타 카드 덱에서 카드를 자동으로 보충합니다."
    eclipseDeck:
      label: "에클립스 덱"
      intro: "매 턴이 끝날 때마다 한 장의 <b>에클립스 카드</b>가 자동으로 사용되며, 다음 네 가지 방식 중 하나로 가디언들의 전선을 무너뜨립니다."
      corruption:
        label: "오염 카드"
        text: "순수한 스타 카드 하나를 잠식하여 <b>오염된 상태</b>로 만듭니다. 오염된 카드는 해당 카드를 배치한 가디언의 턴 기준으로 <b>{decayTurns}턴이 지나면</b> 스스로 붕괴하여 잿더미로 변하므로, 그전에 반드시 정화해야 합니다. 만약 보드에 잠식할 수 있는 해당 원소의 카드가 없다면, 대신 에클립스 추적기 수치가 상승합니다."
      voidCard:
        label: "블랙홀 카드"
        text: "무작위의 빈 타일에 블랙홀을 생성합니다. 블랙홀은 <b>정화할 수 없는 영구적인 장애물</b>이며, 출현하는 즉시 인접한 타일에 서 있는 모든 가디언에게 피해를 입힙니다."
      surge:
        label: "서지 카드"
        text: "<b>에클립스 추적기</b>의 수치를 무작위로 급등시킵니다. 이 상승량은 현재 보드에 깔린 오염된 스타 카드의 수에 비례하여 증가하므로, 오염을 방치하면 게임이 순식간에 파국으로 치닫게 됩니다."
      damage:
        label: "피해 카드"
        text: "지정된 원소의 모든 가디언을 강타하여 <b>1 HP의 피해</b>를 입힙니다. 간혹 '수성 역행' 카드가 나오면 원소와 관계없이 모든 가디언이 동시에 피해를 받습니다."
  environmentFactors:
    heading: "환경적 요인"
    asteroids:
      label: "소행성"
      text: "주기적으로 궤도를 이탈해 보드를 직선으로 가로지르는 <b>통행 불가 장애물</b>입니다. 플레이어 수에 따라 2인 게임은 매 {interval2}턴, 3인은 {interval3}턴, 4인은 {interval4}턴마다 출현합니다. 이동 경로에 있는 스타 카드를 모조리 파괴하고 그 자리에 있던 가디언에게 피해를 입힙니다 (다만 가디언이 피격당하더라도 가디언 본인이 서 있던 칸의 카드는 파괴되지 않고 유지됩니다). <b>완성된 경로, 폐쇄 루프, 그리고 가디언 고유 보호막</b> 내부 영역은 이 파괴 효과로부터 안전하게 보호됩니다."
    shootingStars:
      label: "별똥별"
      text: "모든 보드의 사분면마다 하나씩, 총 <b>{shootingStarCount}개의 별똥별</b>이 숨겨져 있습니다. 별똥별이 위치한 타일에 스타 카드를 배치하는 데 성공하면 즉시 모든 가디언에게 무작위 보너스가 부여됩니다."
  turnActions:
    heading: "턴 액션"
    channel:
      label: "전개 (Channel)"
      text: "손패에서 스타 카드를 유효한 타일에 배치하여 경로를 바깥으로 확장합니다."
    move:
      label: "이동 (Move)"
      text: "자신의 경로를 따라 <b>연결 모양이 일치하는</b> 인접 타일로 발을 옮깁니다. 비용을 지불할 행동력만 충분하다면 한 번의 클릭으로 여러 타일을 연속해서 이동할 수도 있습니다."
    purify:
      label: "정화 (Purify)"
      text: "오염된 스타 카드를 깨끗한 상태로 되돌립니다. 정화된 카드는 이후 에클립스 오염에 영구히 면역됩니다. 단, <b>직접 밟고 지나갔던(이동 액션으로 방문한)</b> 타일만 정화할 수 있으므로, 카드를 배치할 때뿐만 아니라 정화 동선까지 고려하여 이동 경로를 짜야 합니다."
    cosmicDraw:
      label: "코스믹 드로우 (Cosmic Draw)"
      text: "손패에서 원하는 만큼(<b>원한다면 손패 전체</b>) 카드를 선택해 버린 뒤, 즉시 최대 제한까지 새로 뽑습니다. 현재 전략에 꼭 필요한 핵심 카드를 찾아 덱을 순환시키기에 매우 유용한 액션입니다."
    abilitiesNote: "모든 성좌는 이 네 가지 핵심 액션 외에도 자신만의 강력한 고유 능력을 지니고 있습니다. 상단의 도감(또는 게임 내부 인게임 뷰)을 확인하고 기회가 될 때마다 적극적으로 활용하세요."
  winLoss:
    heading: "승리와 패배"
    text: "모든 가디언의 경로가 오염 없이 순수한 상태로 오러리에 도달하는 즉시 모든 플레이어가 함께 승리합니다. 반면, <b>에클립스 추적기가 100% 가득 차거나</b>, 모든 가디언이 동시에 <b>정지 상태(0 HP)</b>가 되어 서로를 부활시켜 줄 아군이 아무도 남지 않게 되면 에클립스의 승리로 게임이 종료됩니다. 정지 상태가 된 가디언은 영구 탈락하는 것이 아니며, 살아남은 아군이 해당 가디언과 인접한 타일에서 턴을 마치면 1 HP 상태로 안전하게 재기동시킬 수 있습니다."
  rules:
    heading: "핵심 규칙"
    asteroidProtection: "중앙 오러리와 외곽 노드를 완전히 연결하여 <b>완성된 경로</b>는 이동하는 소행성의 파괴 효과에 영구적으로 면역됩니다."
    loopImmunity: "스타 카드가 어떠한 형태로든 특정 영역을 완전히 둘러싸서 형성된 <b>폐쇄 루프</b>는 완성된 경로의 일부인지 여부와 관계없이 에클립스 오염 및 소행성 충돌에 영구 면역됩니다."
    purifiedImmunity: "스타 카드를 <b>정화</b>하면 이후 해당 경로의 완성 여부와 상관없이 에클립스 오염의 대상에서 완전히 제외됩니다."
    chainDiscount: "동일한 원소의 스타 카드가 <b>{chainThreshold}장 이상</b> 연속해서 연결되어 체인을 형성하면, 최초 도달 시점에 에클립스 추적기 수치를 즉시 경감시켜 주는 일회성 보너스를 받습니다. 자신의 고유 원소로 체인을 만들면 경감 폭이 더욱 커집니다."

signs:
  ARIES:
    label: "양자리"
    ability: "선봉장 (Vanguard)"
    desc: "매 턴 첫 번째로 배치하는 스타 카드가 자신보다 오러리에 더 가까운 위치라면 AP가 0 소모됩니다."
  LEO:
    label: "사자자리"
    ability: "솔라 플레어 (Solar Flare)"
    desc: "정화 시, 자신과 정화된 타일 사이에 연결된 모든 타일의 오염을 함께 불태워 제거합니다."
  SAGITTARIUS:
    label: "사수자리"
    ability: "아스트랄 애로우 (Astral Arrow)"
    desc: "현재 자신이 위치한 경로와 연결된 곳이라면 어디든 스타 카드를 배치할 수 있습니다 (인접 타일은 1 AP, 그 외 경로는 2 AP 소모)."
  CANCER:
    label: "게자리"
    ability: "루나 실드 (Lunar Shield)"
    desc: "자신의 타일 위나 인접한 타일에 있는 가디언과 스타 카드는 아무런 피해를 받지 않으며, 소행성 충돌로부터 보호받습니다."
  SCORPIO:
    label: "전갈자리"
    ability: "재생 (Regeneration)"
