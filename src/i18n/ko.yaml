# Korean (한국어). PLACEHOLDER — every value below is still the English source text, copied
# verbatim from en.yaml, waiting to be translated by hand. The key SET must always exactly mirror
# en.yaml's (see src/i18n/index.ts's dev-time key-parity check); only the VALUES need translating.
# Interpolation uses {paramName} placeholders — keep every placeholder token from the English
# original in your translation, in whatever word order reads naturally in Korean; the code
# substitutes them positionally by name, not by position in the sentence.
#
# Deliberately NOT translated / not present here as separate entries: any button label that shows
# an underlined keyboard-shortcut letter inline in its own text (Move, Purify, Cosmic Draw, End
# Turn, Back, Rotate, Terraform Hand, Discard to Heal, Protective Precision, Confirm x{n}) — those
# stay hardcoded English directly in JSX per product decision, since the underline always marks a
# literal English letter key (e.g. "M" for Move) that wouldn't make sense to underline in Korean.

# Korean translation for Celestial Alignment generated with Gemini. Keys match the en.yaml dot-paths.
# Interpolation parameters such as {paramName} are preserved exactly.

